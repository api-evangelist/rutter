specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Rutter
providerId: rutter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Commerce
  - B2B
  - Unified API
description: Rutter is a unified API for commerce, accounting, and payments platforms. Public pricing
  is not disclosed beyond a free 30-day starter trial; production access is sold via custom quote through
  sales. The artifact below reflects only what is publicly documented.
sources:
  - https://www.rutter.com/pricing
notes: Rutter does not publish per-call or per-connection prices for production usage. The Full Access
  plan requires a custom quote via the sales team. Rate-limit, quota, and tier definitions are not disclosed
  publicly, so this artifact is intentionally scaffolded to a single Contact Sales plan rather than fabricating
  numbers.
plans:
  - id: rutter-contact-sales
    name: Contact Sales
    type: enterprise
    description: Production access to Rutter's unified commerce/accounting/payments API. Pricing is custom-quoted
      based on volume, platforms used, and support tier. A free 30-day sandbox starter is available for
      evaluation but does not include live production data.
    entries:
      - label: Production Access
        name: production_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Free 30-day sandbox starter (no credit card)
      - name: Unified Accounting API (QuickBooks, Xero, NetSuite, Sage Intacct, etc.)
      - name: Commerce platform integrations
      - name: Payments platform integrations
      - name: Integration management and observability tools
      - name: Onboarding and high-touch support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

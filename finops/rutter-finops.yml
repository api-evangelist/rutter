principles:
  - name: Visibility
    description: Without published meters, visibility depends on Rutter's customer dashboard and any usage
      reports furnished under contract. Capture connection counts and call volumes from the Rutter dashboard.
  - name: Allocation
    description: Tag Rutter consumption by the internal product or workflow that triggers each connection
      (e.g. onboarding, reconciliation) so contract spend can be attributed.
  - name: Optimization
    description: Reduce redundant connector polling, prefer webhook-driven sync where Rutter supports it,
      and consolidate connections per end-customer to keep contracted volume in line.
  - name: Accountability
    description: Assign an owner for the Rutter contract; reconcile invoiced amounts against the customer
      dashboard and downstream platform usage during contract review cycles.

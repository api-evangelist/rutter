specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Rutter
providerId: rutter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Accounting
  - Commerce
  - Unified API
  - Rate Limiting
description: Rutter does not publish numeric API rate limits on its public pricing or developer documentation
  surfaces. Limits are negotiated as part of a Full Access contract. Underlying connector limits (QuickBooks,
  Xero, NetSuite, Sage Intacct, etc.) flow through and apply per-connection. This artifact is left as
  a Contact Sales placeholder until Rutter publishes numeric throttles or shares them under contract.
sources:
  - https://www.rutter.com/pricing
notes: No public per-second / per-minute throttling values were located. Headers and response codes are
  omitted to avoid fabrication.
responseCodes:
  throttled: 429
limits:
  - name: Production rate limits
    scope: account
    metric: varies
    limit: contact sales / not publicly documented
    notes: Rutter sets per-tenant limits in the Full Access contract. Downstream platform limits (e.g.
      QuickBooks Online, NetSuite governance units) also apply per connection.
policies:
  - name: Connector pass-through
    description: Many platform-specific limits (QuickBooks Online, NetSuite governance, Xero minute caps)
      are inherited from the underlying integration and surface as 429s through Rutter.
  - name: Contact Sales for production limits
    description: Numeric production limits are negotiated; clients should request them from their Rutter
      account team rather than assuming defaults.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

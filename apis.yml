aid: rutter
name: Rutter
description: >-
  Rutter is the leading unified RESTful API for B2B financial products that
  connects to over 60 commerce, payments, accounting, and ads platforms
  through a single API. Trusted by companies like Airwallex, Mercury, and
  Ramp, Rutter enables developers to read, update, write, and remove data
  across major business platforms with a unified data model and idempotency
  guarantees for financial data.
type: Index
